<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Gig</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<div class="form-container">

<h2 class="text-center mb-4">Create New Gig</h2>

<form id="gigForm">

<div class="mb-3">
<label>Title</label>
<input type="text" id="title" class="form-control" required>
</div>

<div class="mb-3">
<label>Description</label>
<textarea id="description" class="form-control" rows="4" required></textarea>
</div>

<div class="mb-3">
<label>Budget</label>
<input type="number" id="budget" class="form-control" required>
</div>

<div class="mb-3">
<label>Deadline</label>
<input type="date" id="deadline" class="form-control" required>
</div>

<div class="mb-3">
<label>Skills (Comma Separated)</label>
<input type="text" id="skills" class="form-control" placeholder="HTML,CSS,JavaScript">
</div>

<div class="mb-3">
<label>Duration</label>
<input type="text" id="duration" class="form-control" placeholder="15 Days">
</div>

<div class="mb-3">
<label>Status</label>

<select id="status" class="form-select">

<option value="Open">Open</option>
<option value="Closed">Closed</option>

</select>

</div>

<div class="mb-3">
<label>Created By</label>
<input type="text" id="createdBy" class="form-control" placeholder="Vaibhav">
</div>

<button class="btn btn-success w-100">
Create Gig
</button>

</form>

</div>

</div>

<script type="module" src="js/addGig.js"></script>

</body>

</html>
